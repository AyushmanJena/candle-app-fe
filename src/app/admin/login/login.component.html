<div class="max-w-sm mx-auto mt-20 p-6 mb-20 bg-white shadow rounded">
  <h2 class="text-2xl font-bold mb-4">Admin Login</h2>

  <input type="text"
         placeholder="Username"
         [(ngModel)]="username"
         class="border p-2 w-full mb-3 rounded" />

  <input type="password"
         placeholder="Password"
         [(ngModel)]="password"
         class="border p-2 w-full mb-3 rounded" />

  <button (click)="login()"
          class="bg-blue-600 text-white w-full py-2 rounded">
    Login
  </button>

  <p *ngIf="errorMessage" class="text-red-500 mt-3">{{ errorMessage }}</p>
</div>
