<div class="w-full min-h-screen flex flex-col items-center py-10">
  <div class="w-[75%] rounded-lg border-1  overflow-hidden">

    <div class=" w-full h-14 flex flex-row justify-between items-center px-4 py-4">
      <h1 class="text-xl font-semibold tracking-wide">Order Management</h1>
    </div>

    <table mat-table [dataSource]="dataSource" class="mat-elevation-z8" matSort (matSortChange)="announceSortChange($event)">

      <ng-container matColumnDef="orderId">
        <th mat-header-cell *matHeaderCellDef class="w-[140px] max-w-[140px]" mat-sort-header sortActionDescription="Sort by id"> Order Id </th>
        <td mat-cell *matCellDef="let order" class="w-[140px] max-w-[140px]"> {{order.orderId}} </td>
      </ng-container>

      <ng-container matColumnDef="customerName">
        <th mat-header-cell *matHeaderCellDef mat-sort-header sortActionDescription="Sort by customerName"> Customer Name </th>
        <td mat-cell *matCellDef="let order"> {{order.customerName}} </td>
      </ng-container>

      <ng-container matColumnDef="customerPhone">
        <th mat-header-cell *matHeaderCellDef mat-sort-header sortActionDescription="Sort by price"> Phone Number </th>
        <td mat-cell *matCellDef="let order"> {{order.customerPhone}} </td>
      </ng-container>

      <ng-container matColumnDef="customerPinCode">
        <th mat-header-cell *matHeaderCellDef mat-sort-header sortActionDescription="Sort by stock"> Pin Code </th>
        <td mat-cell *matCellDef="let order"> {{order.customerPinCode}} </td>
      </ng-container>

      <ng-container matColumnDef="orderAmount">
        <th mat-header-cell *matHeaderCellDef mat-sort-header sortActionDescription="Sort by isShown"> Total Amount </th>
        <td mat-cell *matCellDef="let order"> {{order.orderAmount}} </td>
      </ng-container>

      <ng-container matColumnDef="orderItems">
        <th mat-header-cell *matHeaderCellDef mat-sort-header sortActionDescription="Sort by isShown"> No. of Items </th>
        <td mat-cell *matCellDef="let order"> {{order.orderItems}} </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef
            class="w-[140px] max-w-[140px] text-center whitespace-nowrap">
          Actions
        </th>

        <td mat-cell *matCellDef="let order"
            class="w-[200px] max-w-[200px] px-2 whitespace-nowrap">
          <div class="flex items-center justify-center gap-2">
            <button
              class="px-2 py-1 text-sm rounded bg-green-400 hover:bg-green-500 w-18 cursor-pointer"
            (click)="displayOrderDetailsDialog(order.orderId)">
              View
            </button>

            <select id="difficultyLevel" name="difficultyLevel" (change)="changeOrderStatus(order.orderId)" [(ngModel)]="order.orderStatus" class="px-2 py-1 text-sm rounded border-2 cursor-pointer">
              <option value="placed">PLACED</option>
              <option value="accepted">ACCEPTED</option>
              <option value="shipped">SHIPPED</option>
              <option value="delivered">DELIVERED</option>
            </select>
          </div>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>

    <mat-paginator [pageSizeOptions]="[5, 10, 20]"
                   showFirstLastButtons
                   aria-label="Select page of periodic elements">
    </mat-paginator>

  </div>
</div>



<div class="dialog-overlay"  *ngIf="displayOrderDetails">
  <mat-card appearance="outlined" class="w-[40%]">
    <mat-card-content>

      <div class="flex flex-col gap-2 justify-center items-center">

        <div class="flex flex-row items-center justify-between w-full">
          <h1 class="text-2xl font-medium">VIEW ORDER DETAILS</h1>
          <div
            class="bg-gray-500 text-white h-8 w-18 flex flex-row justify-center items-center cursor-pointer rounded-md"
            (click)="onEditDialogClose()"
          >X</div>
        </div>


        <div>
          order details would be displayed here
        </div>
      </div>

    </mat-card-content>
  </mat-card>
</div>
