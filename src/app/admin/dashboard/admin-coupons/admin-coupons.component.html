<div class="w-full min-h-screen flex flex-col items-center py-10">
  <div class="w-[75%] rounded-lg border-1  overflow-hidden">

    <div class=" w-full h-14 flex flex-row justify-between items-center px-4 py-4">
      <h1 class="text-xl font-semibold tracking-wide">Coupon Management</h1>
      <button
          class="px-2 py-2 text-sm rounded bg-blue-400 hover:bg-blue-500 text-white cursor-pointer" (click)="displayAddDialog()">
          ADD NEW COUPON
        </button>
    </div>

    <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">

      <ng-container matColumnDef="couponId">
        <th mat-header-cell *matHeaderCellDef class="w-[140px] max-w-[140px]"> Coupon Id </th>
        <td mat-cell *matCellDef="let coupon" class="w-[140px] max-w-[140px]"> {{coupon.couponId}} </td>
      </ng-container>

      <ng-container matColumnDef="couponCode">
        <th mat-header-cell *matHeaderCellDef> Coupon Code </th>
        <td mat-cell *matCellDef="let coupon"> {{coupon.couponCode}} </td>
      </ng-container>

      <ng-container matColumnDef="discountPercentage">
        <th mat-header-cell *matHeaderCellDef> Discount </th>
        <td mat-cell *matCellDef="let coupon"> {{coupon.discountPercentage}} %</td>
      </ng-container>

      <ng-container matColumnDef="minimumPurchase">
        <th mat-header-cell *matHeaderCellDef> Minimum Purchase </th>
        <td mat-cell *matCellDef="let coupon"> ₹{{coupon.minimumPurchase}} </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef
            class="w-[140px] max-w-[140px] text-center whitespace-nowrap">
          Actions
        </th>

        <td mat-cell *matCellDef="let coupon"
            class="w-[140px] max-w-[140px] px-2 whitespace-nowrap">
          <div class="flex items-center justify-center gap-2">
            <button
              class="px-2 py-1 text-sm rounded bg-red-400 hover:bg-red-500 w-18 cursor-pointer">
              {{ coupon.isShown ? 'Hide' : 'Show' }}
            </button>

<!--            <button-->
<!--              class="px-2 py-1 text-sm rounded bg-red-400 hover:bg-red-500 cursor-pointer"-->
<!--              (click)="deleteCoupon(coupon.orderId)">-->
<!--              View-->
<!--            </button>-->
          </div>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>

  </div>
</div>


<div class="dialog-overlay"  *ngIf="addDialogShown">
  <mat-card appearance="outlined" class="w-[40%]">
    <mat-card-content>

      <div class="flex flex-col gap-2 justify-center items-center">
        <div class="flex flex-row items-center justify-between w-full">
          <h1 class="text-2xl font-medium">EDIT PRODUCT DETAILS</h1>
          <div
            class="bg-gray-500 text-white h-8 w-18 flex flex-row justify-center items-center rounded-md cursor-pointer"
            (click)="onAddDialogClose()"
          >X</div>
        </div>
        <div class=" p-4 w-[75%]">
          <form [formGroup]="addForm" class="flex flex-col gap-4">

            <div class="flex flex-row justify-between items-center">
              <label for="couponCode">CouponCode<span class="text-red-600">*</span></label>
              <div class="flex flex-col">
                <input
                  type="text"
                  id="couponCode"
                  formControlName="couponCode"
                  class="form-control">
                <small *ngIf=" this.addForm.get('couponCode')?.invalid && (addForm.get('couponCode')?.touched || addForm.get('couponCode')?.dirty)"
                    class="text-red-600"
                >Coupon Code is Required</small>
              </div>
            </div>

            <div class="flex flex-row justify-between items-center">
              <label for="discount">Discount Percentage<span class="text-red-600">*</span></label>
              <div class="flex flex-col">
                <input
                  type="number"
                  id="discount"
                  formControlName="discount"
                  class="form-control">
                <small *ngIf=" this.addForm.get('discount')?.invalid && (addForm.get('discount')?.touched || addForm.get('discount')?.dirty)"
                    class="text-red-600"
                >Discount is Required</small>
              </div>
            </div>

            <div class="flex flex-row justify-between items-center">
              <label for="minimumPurchase">Minimum Purchase<span class="text-red-600">*</span></label>
              <div class="flex flex-col">
                <input
                  type="number"
                  id="minimumPurchase"
                  formControlName="minimumPurchase"
                  class="form-control">
              </div>
            </div>

          </form>
        </div>

        <div class=" flex flex-col justify-center items-center">
          <button class="save-button " (click)="saveCouponData()" >SAVE</button>
        </div>

      </div>
    </mat-card-content>
  </mat-card>
</div>
