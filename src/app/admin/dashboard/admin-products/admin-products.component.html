<div class="w-full min-h-screen flex flex-col items-center py-10">


  <div class="w-[75%] rounded-lg border-1  overflow-hidden">

    <div class=" w-full h-14 flex flex-row justify-between items-center px-4 py-4">
      <h1 class="text-xl font-semibold tracking-wide">Product Management</h1>
      <button
          class="px-2 py-2 text-sm rounded bg-blue-400 hover:bg-blue-500 text-white cursor-pointer" (click)="displayEditDialog()">
          ADD NEW PRODUCT
        </button>
    </div>

    <table mat-table [dataSource]="dataSource" class="mat-elevation-z8" matSort (matSortChange)="announceSortChange($event)">

      <ng-container matColumnDef="productId">
        <th mat-header-cell *matHeaderCellDef class="w-[140px] max-w-[140px]" mat-sort-header sortActionDescription="Sort by id"> Product Id </th>
        <td mat-cell *matCellDef="let product" class="w-[140px] max-w-[140px]"> {{product.productId}} </td>
      </ng-container>

      <ng-container matColumnDef="productTitle">
        <th mat-header-cell *matHeaderCellDef mat-sort-header sortActionDescription="Sort by title"> Title </th>
        <td mat-cell *matCellDef="let product"> {{product.productTitle}} </td>
      </ng-container>

      <ng-container matColumnDef="finalPrice">
        <th mat-header-cell *matHeaderCellDef mat-sort-header sortActionDescription="Sort by price"> Final Price </th>
        <td mat-cell *matCellDef="let product"> {{product.finalPrice}} </td>
      </ng-container>

      <ng-container matColumnDef="stock">
        <th mat-header-cell *matHeaderCellDef mat-sort-header sortActionDescription="Sort by stock"> Stock </th>
        <td mat-cell *matCellDef="let product"> {{product.stock}} </td>
      </ng-container>

      <ng-container matColumnDef="isShown">
        <th mat-header-cell *matHeaderCellDef mat-sort-header sortActionDescription="Sort by isShown"> Shown </th>
        <td mat-cell *matCellDef="let product"> {{product.isShown ? "SHOWN" : "HIDDEN"}} </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef
            class="w-[140px] max-w-[140px] text-center whitespace-nowrap">
          Actions
        </th>

        <td mat-cell *matCellDef="let product"
            class="w-[140px] max-w-[140px] px-2 whitespace-nowrap">
          <div class="flex items-center justify-center gap-2">
            <button
              class="px-2 py-1 text-sm rounded bg-yellow-400 hover:bg-yellow-500 w-18  cursor-pointer"
              (click)="displayEditDialog(product.productId)">
              Edit
            </button>

            <button
              class="px-2 py-1 text-sm rounded bg-red-400 hover:bg-red-500 w-18  cursor-pointer">
              {{ product.isShown ? 'Hide' : 'Show' }}
            </button>
          </div>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>

    <mat-paginator [pageSizeOptions]="[5, 10, 20]"
                   showFirstLastButtons
                   aria-label="Select page of periodic elements">
    </mat-paginator>

  </div>
</div>

<div class="dialog-overlay"  *ngIf="editDialogShown">
  <mat-card appearance="outlined" class="w-[40%]">
    <mat-card-content>

      <div class="flex flex-col gap-2 justify-center items-center">
        <div class="flex flex-row items-center justify-between w-full">
          <h1 class="text-2xl font-medium">EDIT PRODUCT DETAILS</h1>
          <div
            class="bg-gray-500 text-white h-8 w-18 flex flex-row justify-center items-center rounded-md cursor-pointer"
            (click)="onEditDialogClose()"
          >X</div>
        </div>
        <div class=" p-4 w-[75%]">
          <form [formGroup]="editForm" class="flex flex-col gap-4">

            <div class="flex flex-row justify-between items-center">
              <label for="productId" class="font-medium">Product Id</label>
              <input
                id="productId"
                type="text"
                formControlName="productId"
                class="form-control"
                readonly>
            </div>

            <div class="flex flex-row justify-between items-center">
              <label for="title">Title<span class="text-red-600">*</span></label>
              <div class="flex flex-col">
                <input
                  type="text"
                  id="title"
                  formControlName="title"
                  class="form-control">
                <small *ngIf=" this.editForm.get('title')?.invalid && (editForm.get('title')?.touched || editForm.get('title')?.dirty)"
                    class="text-red-600"
                >Title is Required</small>
              </div>
            </div>

            <div class="flex flex-row justify-between items-center">
              <label for="originalPrice">Original Price</label>
              <div class="flex flex-col">
                <input
                  type="number"
                  id="originalPrice"
                  formControlName="originalPrice"
                  class="form-control">
              </div>
            </div>

            <div class="flex flex-row justify-between items-center">
              <label for="finalPrice">Final Price<span class="text-red-600">*</span></label>
              <div class="flex flex-col">
                <input
                  type="number"
                  id="finalPrice"
                  formControlName="finalPrice"
                  class="form-control">
                <small *ngIf=" this.editForm.get('finalPrice')?.invalid && (editForm.get('finalPrice')?.touched || editForm.get('finalPrice')?.dirty)"
                       class="text-red-600"
                >Final Price is Required</small>
              </div>
            </div>

            <div class="flex flex-row justify-between items-center">
              <label for="stock">Edit Quantity<span class="text-red-600">*</span></label>
              <div class="flex flex-col">
                <input
                  type="number"
                  id="stock"
                  formControlName="stock"
                  class="form-control">
                <small *ngIf=" this.editForm.get('stock')?.invalid && (editForm.get('stock')?.touched || editForm.get('stock')?.dirty)"
                       class="text-red-600"
                >Quantity is Required</small>
              </div>
            </div>

            <div class="flex flex-row justify-between items-center">
              <label for="description">Description</label>
              <div class="flex flex-col">
                <input
                  type="text"
                  id="description"
                  formControlName="description"
                  class="form-control">
              </div>
            </div>

          </form>
        </div>

        <div class=" flex flex-col justify-center items-center">
          <button class="save-button " (click)="saveProductData()" >SAVE</button>
        </div>

      </div>
    </mat-card-content>
  </mat-card>
</div>
