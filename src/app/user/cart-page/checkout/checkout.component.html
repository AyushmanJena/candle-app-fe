<div class=" flex flex-col justify-center items-center max-w-[600px] mx-auto mb-32 ">
  <div class="flex flex-row justify-start w-full mt-20 mb-8">
    <h2 class="text-3xl">Place Order</h2>
  </div>

  <form class="w-full flex flex-col gap-4">
    <!--  user details form-->
    <div class="bg-white flex flex-col gap-2 rounded-md pb-8 pt-4 px-8 border-1 border-black shadow-2xs">
      <h2 class="text-xl">User Information</h2>
      <div>
        <label for="name">Name: </label>
        <input type="text" id="name" formControlName="name" class="form-control">
      </div>
      <div>
        <label for="phoneNumber">Phone Number: </label>
        <input type="number" id="phoneNumber" formControlName="phoneNumber" class="form-control">
      </div>
      <div>
        <label for="email">Email Address: </label>
        <input type="email" id="email" formControlName="email" class="form-control">
      </div>
    </div>

    <!--  user Address form-->
    <div class="bg-white flex flex-col gap-2 rounded-md pb-8 pt-4 px-8 border-1 border-black shadow-2xs">
      <h2 class="text-xl">Address Information</h2>
      <div>
        <label for="houseNumber">House Number: </label>
        <input type="text" id="houseNumber" formControlName="houseNumber" class="form-control">
      </div>
      <div>
        <label for="area">Address: </label>
        <input type="text" id="area" formControlName="area" class="form-control">
      </div>
      <div>
        <label for="landmark">Landmark: </label>
        <input type="text" id="landmark" formControlName="landmark" class="form-control">
      </div>
      <div>
        <label for="pincode">Pincode: </label>
        <input type="number" id="pincode" formControlName="pincode" class="form-control">
      </div>
      <div>
        <label for="city">City: </label>
        <input type="text" id="city" formControlName="city" class="form-control">
      </div>
      <div>
        <label for="state">State: </label>
        <input type="text" id="state" formControlName="state" class="form-control">
      </div>
    </div>

    <!--  Payment details form-->
    <div class="bg-white flex flex-col gap-2 rounded-md pb-8 pt-4 px-8 border-1 border-black shadow-2xs">
      <h2 class="text-xl">Payment Information</h2>
      <div>
        <label for="paymentMode">Payment Mode: </label>
        <input type="text" id="paymentMode" formControlName="paymentMode" class="form-control">
      </div>
      <div>
        <label for="paymentDetails">More Payment Details: </label>
        <input type="text" id="paymentDetails" formControlName="paymentDetails" class="form-control">
      </div>
    </div>

    <div class="">
      <button class="bg-black text-white w-full px-14 py-3 border border-black rounded-md
        hover:bg-white hover:text-black hover:border-black transition cursor-pointer" (click)="confirmOrder()">
        PLACE ORDER
      </button>
    </div>

  </form>


</div>
