<div class="flex flex-col justify-center items-center pb-72">

  <h2 class="text-3xl">Collection Name</h2>

  <div class="flex flex-col items-center justify-center m-12 my-16">
    <div class="flex flex-row justify-center flex-wrap gap-6">
      <div *ngFor="let productData of collectionProducts">
        <app-product-card [productCardData]="productData" [showAddToCartButton]="true"></app-product-card>
      </div>
    </div>
  </div>

</div>
