<div
  class="relative w-60 h-80 rounded-xl overflow-hidden cursor-pointer group"
>
  <img
    [src]="collectionData.imageUrl"
    class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110"
  />

  <!-- Dark overlay -->
  <div
    class="absolute inset-0 bg-black/0 transition-colors duration-500 group-hover:bg-black/40"
  ></div>

  <!-- Centered Text -->
  <div
    class="absolute inset-0 flex items-center justify-center text-white text-xl font-semibold opacity-0 group-hover:opacity-100 transition-opacity duration-500"
  >
    {{ collectionData.title }}
  </div>
</div>
