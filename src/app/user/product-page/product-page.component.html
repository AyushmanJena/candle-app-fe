<div class="w-full max-w-[1080px]  mx-auto pb-24">
  <div class="mt-12 flex flex-col ">
    <div class="flex flex-row  p-12 gap-6">


      <div class="relative aspect-[4/3] w-[480px] flex-shrink-0 group">

        <!-- IMAGE -->
        <img *ngIf="images?.length" [src]="images[currentImageIndex]" alt="Product Image"
          class="w-full h-full object-cover rounded-lg transition-opacity duration-300" />

        <!-- PREV BUTTON -->
        <button (click)="prevImage()" class="absolute left-2 top-1/2 -translate-y-1/2 bg-black/50 text-white
           p-2 rounded-full opacity-0 group-hover:opacity-100 transition">
          ◁
        </button>

        <!-- NEXT BUTTON -->
        <button (click)="nextImage()" class="absolute right-2 top-1/2 -translate-y-1/2 bg-black/50 text-white
           p-2 rounded-full opacity-0 group-hover:opacity-100 transition">
          ▷
        </button>
      </div>

      <div class="p-4  flex flex-col justify-around w-full">
        <p class="text-xl">{{product.title}}</p>

        <div class="w-full p-2 flex flex-row items-center gap-6">
          <div class="text-3xl font-medium">₹{{product.discountedPrice}}</div>
          <div *ngIf="product.originalPrice !== product.discountedPrice" class="line-through text-xl">
            ₹{{product.originalPrice}}</div>
        </div>

        <!-- Add to Cart -->
        <div class="mt-4 w-42">

          <!-- Add Button -->
          <button *ngIf="inCartQuantity == 0" (click)="addProductToCart()" class="w-full h-10 text-sm font-medium
           border border-neutral-900
           rounded-md
           hover:bg-neutral-900 hover:text-white
           transition-all duration-200 cursor-pointer">
            Add To Cart
          </button>

          <!-- Quantity Controls -->
          <div *ngIf="inCartQuantity > 0" class="w-full h-10 flex items-center justify-between
           border border-neutral-900 bg-black rounded-md transition-all duration-200">
            <button type="button" (click)="decreaseQuantity()" class="w-10 h-full flex items-center justify-center
             text-lg font-medium
             hover:bg-neutral-700 text-white
             transition-all duration-200 cursor-pointer">
              −
            </button>

            <div class="text-sm font-medium text-white">
              {{ inCartQuantity }}
            </div>

            <button type="button" (click)="increaseQuantity()" class="w-10 h-full flex items-center justify-center
             text-lg font-medium hover:bg-neutral-700  text-white
             transition-all duration-200 cursor-pointer">
              +
            </button>
          </div>

        </div>
      </div>
    </div>

    <div class="px-12">
      <h3 class="text-xl font-medium">Product Description</h3>
      {{product.description}}
    </div>
  </div>

  <div class="flex flex-col items-center m-12 my-16 gap-8">
    <h2 class="text-3xl">Similar Products</h2>
    <div class="flex flex-row justify-center gap-6">
      <div *ngFor="let productData of bestSellersList">
        <app-product-card [productCardData]="productData" [showAddToCartButton]="false"></app-product-card>
      </div>
    </div>
  </div>
</div>
